<rect width="100%" height="100%" fill="#ffffff"/><text x="24" y="32" class="title">Avg decode throughput with output-length context</text><text x="24" y="52" class="subtitle">Higher is better. Note GPT-5.4 returned fewer tokens on average, so its TPS is not on identical output lengths.</text><line x1="250.0" y1="70" x2="250.0" y2="316" class="grid"/><text x="250.0" y="332" text-anchor="middle" class="small">0</text><line x1="388.3" y1="70" x2="388.3" y2="316" class="grid"/><text x="388.3" y="332" text-anchor="middle" class="small">100</text><line x1="526.7" y1="70" x2="526.7" y2="316" class="grid"/><text x="526.7" y="332" text-anchor="middle" class="small">200</text><line x1="665.0" y1="70" x2="665.0" y2="316" class="grid"/><text x="665.0" y="332" text-anchor="middle" class="small">300</text><line x1="803.4" y1="70" x2="803.4" y2="316" class="grid"/><text x="803.4" y="332" text-anchor="middle" class="small">400</text><line x1="941.7" y1="70" x2="941.7" y2="316" class="grid"/><text x="941.7" y="332" text-anchor="middle" class="small">500</text><line x1="1080.1" y1="70" x2="1080.1" y2="316" class="grid"/><text x="1080.1" y="332" text-anchor="middle" class="small">600</text><line x1="1218.4" y1="70" x2="1218.4" y2="316" class="grid"/><text x="1218.4" y="332" text-anchor="middle" class="small">700</text><line x1="1356.7" y1="70" x2="1356.7" y2="316" class="grid"/><text x="1356.7" y="332" text-anchor="middle" class="small">800</text><text x="240" y="94" text-anchor="end" class="label">opencode-gpt-5.4</text><rect x="250" y="80" width="580.0" height="18" rx="4" fill="#059669" opacity="0.88"/><text x="838.0" y="93" class="value">419.2 tok/s</text><text x="838" y="93" class="small">avg out 57.6 tok</text><text x="240" y="126" text-anchor="end" class="label">mlx-gemma4-e4b</text><rect x="250" y="112" width="92.5" height="18" rx="4" fill="#2563eb" opacity="0.88"/><text x="350.5" y="125" class="value">66.9 tok/s</text><text x="838" y="125" class="small">avg out 96.0 tok</text><text x="240" y="158" text-anchor="end" class="label">mlx-gemma4-26b</text><rect x="250" y="144" width="89.9" height="18" rx="4" fill="#2563eb" opacity="0.88"/><text x="347.9" y="157" class="value">65.0 tok/s</text><text x="838" y="157" class="small">avg out 96.0 tok</text><text x="240" y="190" text-anchor="end" class="label">ollama-gemma4-e4b</text><rect x="250" y="176" width="77.0" height="18" rx="4" fill="#ea580c" opacity="0.88"/><text x="335.0" y="189" class="value">55.7 tok/s</text><text x="838" y="189" class="small">avg out 96.0 tok</text><text x="240" y="222" text-anchor="end" class="label">ollama-gemma4-26b</text><rect x="250" y="208" width="73.0" height="18" rx="4" fill="#ea580c" opacity="0.88"/><text x="331.0" y="221" class="value">52.7 tok/s</text><text x="838" y="221" class="small">avg out 96.0 tok</text><text x="240" y="254" text-anchor="end" class="label">mlx-gemma4-31b</text><rect x="250" y="240" width="17.5" height="18" rx="4" fill="#2563eb" opacity="0.88"/><text x="275.5" y="253" class="value">12.7 tok/s</text><text x="838" y="253" class="small">avg out 96.0 tok</text><text x="240" y="286" text-anchor="end" class="label">ollama-gemma4-31b</text><rect x="250" y="272" width="15.6" height="18" rx="4" fill="#ea580c" opacity="0.88"/><text x="273.6" y="285" class="value">11.3 tok/s</text><text x="838" y="285" class="small">avg out 96.0 tok</text><line x1="250" y1="64" x2="250" y2="316" class="axis"/>
