<rect width="100%" height="100%" fill="#ffffff"/><text x="24" y="32" class="title">MLX vs Ollama (GGUF path) summary</text><text x="24" y="52" class="subtitle">Positive values favor MLX. TTFT and total-time columns mean Ollama is slower by that amount.</text><line x1="24" y1="76" x2="956" y2="76" class="grid"/><text x="80" y="96" class="label">Size</text><text x="240" y="96" class="label">TTFT delta</text><text x="500" y="96" class="label">TPS delta</text><text x="740" y="96" class="label">Total-time delta</text><text x="80" y="126" class="value">4B</text><text x="240" y="126" class="value" fill="#059669">+67.7%</text><text x="500" y="126" class="value" fill="#059669">+20.1%</text><text x="740" y="126" class="value" fill="#059669">+54.8%</text><line x1="24" y1="140" x2="956" y2="140" class="grid"/><text x="80" y="168" class="value">26B</text><text x="240" y="168" class="value" fill="#059669">+7.5%</text><text x="500" y="168" class="value" fill="#059669">+23.3%</text><text x="740" y="168" class="value" fill="#059669">+10.4%</text><line x1="24" y1="182" x2="956" y2="182" class="grid"/><text x="80" y="210" class="value">31B</text><text x="240" y="210" class="value" fill="#b91c1c">-6.3%</text><text x="500" y="210" class="value" fill="#059669">+12.1%</text><text x="740" y="210" class="value" fill="#b91c1c">-3.7%</text><line x1="24" y1="224" x2="956" y2="224" class="grid"/>
